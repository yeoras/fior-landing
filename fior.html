<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIOR | 당신의 드라이빙 메이트</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #fdfaf4; /* 따뜻한 크림색 배경 */
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 전체 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 1200px;
        }

        /* 상단 헤더 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 800;
            color: #444;
            letter-spacing: 1px;
        }

        .logo-icon {
            background-color: #ff9f43;
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            font-size: 20px;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-point { background: #fff; color: #ff9f43; border: 1px solid #ffeaa7; }
        .btn-login { background: #fff; color: #555; }
        .btn-join { background: #ff9f43; color: #fff; box-shadow: 0 4px 12px rgba(255, 159, 67, 0.3); }

        /* 메인 레이아웃 (3단 그리드) */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 30px;
        }

        /* 공통 카드 스타일 */
        .card {
            background-color: #ffffff;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 좌측 리스트 아이템 */
        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 15px;
        }
        
        .list-item:last-child { margin-bottom: 0; }
        
        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }
        
        .rank-circle {
            background-color: #ffeaa7;
            color: #e17055;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 800;
        }

        .item-tag {
            font-size: 11px;
            color: #aaa;
            background: #f5f5f5;
            padding: 4px 8px;
            border-radius: 8px;
        }

        /* 중앙 메인 콘텐츠 */
        .center-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }

        .center-board h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .center-board p {
            color: #888;
            margin-bottom: 40px;
            font-size: 15px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .menu-box {
            background-color: #fafafa;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-box:hover {
            background-color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transform: translateY(-5px);
        }

        .menu-icon {
            font-size: 28px;
            margin-bottom: 15px;
            color: #555;
            background: #fff;
            width: 50px;
            height: 50px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .menu-box h3 { font-size: 16px; margin-bottom: 6px; }
        .menu-box span { font-size: 12px; color: #999; }

        /* 우측 패널 */
        .promo-banner {
            background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
            color: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2);
            cursor: pointer;
        }

        .banner-icon {
            background: rgba(255,255,255,0.2);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px;
        }

        .promo-text h4 { font-size: 16px; margin-bottom: 4px; }
        .promo-text p { font-size: 12px; opacity: 0.9; }

        .chat-widget {
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chat-bubble {
            background: #f5f6fa;
            padding: 16px;
            border-radius: 0 16px 16px 16px;
            font-size: 14px;
            color: #444;
            margin-bottom: auto;
            line-height: 1.5;
        }

        .chat-input {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f5f6fa;
            padding: 12px 16px;
            border-radius: 20px;
            color: #aaa;
            font-size: 14px;
        }

        /* 하단 카피라이트 */
        footer {
            text-align: center;
            margin-top: 50px;
            color: #bbb;
            font-size: 12px;
        }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-area">
            <div class="logo-icon">👓</div>
            FIOR
        </div>
        <div class="header-buttons">
            <button class="btn btn-point">🪙 300 P</
